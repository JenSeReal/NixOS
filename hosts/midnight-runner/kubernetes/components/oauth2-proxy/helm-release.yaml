---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
spec:
  interval: 10m
  chart:
    spec:
      chart: oauth2-proxy
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    config:
      configFile: |-
        provider = "oidc"
        oidc_issuer_url = "https://sso.jfp.one/application/o/oauth2-proxy/"
        email_domains = ["*"]
        cookie_secure = true
        cookie_samesite = "lax"
        cookie_domains = [".jfp.one"]
        whitelist_domains = [".jfp.one"]
        skip_provider_button = true
        code_challenge_method = "S256"
        reverse_proxy = true
        upstreams = ["http://UPSTREAM_SERVICE:80"]
    existingSecret: oauth2-proxy
    extraArgs:
      cookie-refresh: "1m"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
