---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: acc-tools
spec:
  interval: 10m
  chart:
    spec:
      chart: acc-session-viewer
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: jensereal-charts
        namespace: flux-system
  values:
    imagePullSecrets:
    - name: ghcr-jensereal-pull
    image:
      repository: ghcr.io/jensereal/acc-session-reader
      tag: latest
