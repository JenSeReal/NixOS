---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-http-filter-redirect
spec:
  parentRefs:
  - name: jfp-one
    namespace: networking
    sectionName: http
  hostnames:
  - jfp.one
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-outpost
spec:
  parentRefs:
  - name: jfp-one
    namespace: networking
    sectionName: https
  hostnames:
  - jfp.one
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /outpost.goauthentik.io
    backendRefs:
    - name: ak-outpost-authentik-embedded-outpost
      namespace: authentik
      port: 9000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
spec:
  parentRefs:
  - name: jfp-one
    namespace: networking
    sectionName: https
  hostnames:
  - jfp.one
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: whoami
      port: 80
