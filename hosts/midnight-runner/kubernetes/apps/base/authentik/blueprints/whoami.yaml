version: 1
metadata:
  name: Whoami Forward Auth
  labels:
    blueprints.goauthentik.io/description: Forward auth configuration for whoami application
context:
  external_host: https://jfp.one
  cookie_domain: jfp.one
  authentik_host: https://sso.jfp.one
entries:
  # Proxy Provider for forward auth (domain level)
  - model: authentik_providers_proxy.proxyprovider
    id: provider-whoami
    state: present
    identifiers:
      name: whoami-forward-auth
    attrs:
      name: whoami-forward-auth
      mode: forward_domain
      external_host: !Context external_host
      cookie_domain: !Context cookie_domain
      access_token_validity: hours=24
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]

  # Application for whoami
  - model: authentik_core.application
    id: app-whoami
    state: present
    identifiers:
      slug: whoami
    attrs:
      name: Whoami
      slug: whoami
      provider: !KeyOf provider-whoami
      policy_engine_mode: any

  # Add application to embedded outpost
  - model: authentik_outposts.outpost
    state: present
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      name: authentik Embedded Outpost
      type: proxy
      applications:
        - !Find [authentik_core.application, [slug, whoami]]
