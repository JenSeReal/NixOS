version: 1
metadata:
  name: Whoami OAuth2
  labels:
    blueprints.goauthentik.io/description: OAuth2/OIDC configuration for whoami application
entries:
# OAuth2/OIDC Provider for oauth2-proxy
- model: authentik_providers_oauth2.oauth2provider
  id: provider-whoami
  state: present
  identifiers:
    name: whoami
  attrs:
    name: whoami
    client_type: confidential
    client_id: ENC[AES256_GCM,data:TlQ6sZ6H9s59wKTthh73dWAtoeTg8lH72U8dbx653b5CWSZCYmywng==,iv:3Ixge2UyllBhRysrXuqOJ867DCCob6yQDuoSpq32qRE=,tag:+vgPZJxjpOnJd/hd167M5A==,type:str]
    client_secret: ENC[AES256_GCM,data:UfGQjkJyNvZ8HwPzZV6WDYtyMWnwdZVj5BWP5VrAk9a5g40yJx5rWD/ePOxBIpbOa3SItIeYcAoZ1bXnWB9iY2f9al0cuAXFQWkvfPGfo+w6WEH1pC1fPW4hnlzf+qKhYgdxI6aB/WYu2nCiKZ4eZumkQmWSuzTMCA9MAB1iFIk=,iv:TI8YJ8N/gyUyHY6w2dXuSCppWkLi9hUdsGKSA8pePqw=,tag:GLWuYVp04ScUc5iFpzi0Ng==,type:str]
    redirect_uris: https://jfp.one/oauth2/callback
    access_code_validity: minutes=10
    access_token_validity: hours=1
    refresh_token_validity: days=30
    authorization_flow:
    - authentik_flows.flow
    - - slug
      - default-provider-authorization-implicit-consent
    invalidation_flow:
    - authentik_flows.flow
    - - slug
      - default-provider-invalidation-flow
    signing_key:
    - authentik_crypto.certificatekeypair
    - - name
      - authentik Self-signed Certificate
    property_mappings:
    - - authentik_providers_oauth2.scopemapping
      - - scope_name
        - openid
    - - authentik_providers_oauth2.scopemapping
      - - scope_name
        - email
    - - authentik_providers_oauth2.scopemapping
      - - scope_name
        - profile
# Application for whoami
- model: authentik_core.application
  id: app-whoami
  state: present
  identifiers:
    slug: whoami
  attrs:
    name: Whoami
    slug: whoami
    provider: provider-whoami
    policy_engine_mode: any
