---
version: 1
metadata:
  name: Jitsi JWT
  labels:
    blueprints.goauthentik.io/description: JWT/OIDC configuration for Jitsi Meet
entries:
  # Custom scope mapping for Jitsi context
  - model: authentik_providers_oauth2.scopemapping
    id: jitsi-context-mapping
    state: present
    identifiers:
      name: "Jitsi Context"
    attrs:
      name: "Jitsi Context"
      scope_name: jitsi
      expression: |
        return {
          "aud": "jitsi",
          "iss": "authentik",
          "sub": "*",
          "room": "*",
          "context": {
            "user": {
              "id": str(request.user.pk),
              "name": request.user.name or request.user.username,
              "email": request.user.email,
              "avatar": request.user.avatar,
            },
            "group": "",
          },
        }

  # OAuth2/OIDC Provider for Jitsi
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-jitsi
    state: present
    identifiers:
      name: jitsi
    attrs:
      name: jitsi
      client_type: confidential
      client_id: !Env JITSI_CLIENT_ID
      client_secret: !Env JITSI_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: https://talk.jfp.one/jitsi-openid/callback
      access_code_validity: minutes=10
      access_token_validity: hours=4
      refresh_token_validity: days=30
      include_claims_in_id_token: true
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf jitsi-context-mapping

  # Application for Jitsi
  - model: authentik_core.application
    id: app-jitsi
    state: present
    identifiers:
      slug: jitsi
    attrs:
      name: Jitsi Meet
      slug: jitsi
      provider: !KeyOf provider-jitsi
      policy_engine_mode: any
