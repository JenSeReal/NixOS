---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jitsi-custom-nginx
data:
  custom-meet.conf: |-
    location ^~ /jitsi-openid/ {
        # Inject valid JSON state: {} (URL-encoded: %7B%7D)
        set $args "state=%7B%7D&room=$arg_room";
        proxy_pass http://jitsi-oidc-adapter.jitsi.svc.cluster.local:3001/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
