---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jitsi-custom-nginx
data:
  custom-meet.conf: |-
    location /jitsi-openid/authenticate {
        # Rewrite to inject a minimal valid JSON state: {} (URL-encoded: %7B%7D)
        if ($args ~* "room=([^&]+)") {
            set $room_name $1;
        }
        set $args "state=%7B%7D&room=$room_name";
        proxy_pass http://jitsi-oidc-adapter.jitsi.svc.cluster.local:3001/authenticate;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    location /jitsi-openid/ {
        proxy_pass http://jitsi-oidc-adapter.jitsi.svc.cluster.local:3001/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
