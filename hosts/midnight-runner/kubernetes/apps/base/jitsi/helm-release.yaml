---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jitsi
spec:
  interval: 30m
  chart:
    spec:
      chart: jitsi-meet
      version: "1.3.1"
      sourceRef:
        kind: HelmRepository
        name: jitsi
        namespace: flux-system
  valuesFrom:
  - kind: ConfigMap
    name: values
    valuesKey: values.yaml
