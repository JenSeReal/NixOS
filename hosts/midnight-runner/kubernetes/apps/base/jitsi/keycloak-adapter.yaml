---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-oidc-adapter
  labels:
    app: jitsi-oidc-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-oidc-adapter
  template:
    metadata:
      labels:
        app: jitsi-oidc-adapter
    spec:
      containers:
      - name: adapter
        image: ghcr.io/jitsi-contrib/jitsi-oidc-adapter:latest
        ports:
        - containerPort: 9000
          name: http
        env:
        - name: OIDC_ISSUER_URL
          value: "https://sso.jfp.one/application/o/jitsi/"
        - name: OIDC_CLIENT_ID
          value: "jitsi"
        - name: OIDC_CLIENT_SECRET
          value: ""
        - name: JWT_APP_ID
          value: "jitsi"
        - name: JWT_APP_SECRET
          valueFrom:
            secretKeyRef:
              name: jitsi-keycloak-adapter
              key: jwt-app-secret
        - name: ALLOW_UNSECURE_CERT
          value: "false"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-oidc-adapter
spec:
  selector:
    app: jitsi-oidc-adapter
  ports:
  - port: 9000
    targetPort: 9000
    name: http
