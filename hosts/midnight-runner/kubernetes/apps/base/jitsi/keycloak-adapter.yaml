---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-oidc-adapter
  labels:
    app: jitsi-oidc-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-oidc-adapter
  template:
    metadata:
      labels:
        app: jitsi-oidc-adapter
    spec:
      containers:
      - name: adapter
        image: mod242/jitsi-go-openid:latest
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: JITSI_SECRET
          valueFrom:
            secretKeyRef:
              name: jitsi-keycloak-adapter
              key: JWT_APP_SECRET
        - name: JITSI_URL
          value: "https://talk.jfp.one"
        - name: JITSI_SUB
          value: "jitsi"
        - name: ISSUER_BASE_URL
          value: "https://sso.jfp.one/application/o/jitsi/"
        - name: BASE_URL
          value: "https://talk.jfp.one/jitsi-openid"
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: jitsi-keycloak-adapter
              key: oidc-client-id
        - name: SECRET
          valueFrom:
            secretKeyRef:
              name: jitsi-keycloak-adapter
              key: oidc-client-secret
        - name: PREJOIN
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-oidc-adapter
spec:
  selector:
    app: jitsi-oidc-adapter
  ports:
  - port: 3001
    targetPort: 3001
    name: http
