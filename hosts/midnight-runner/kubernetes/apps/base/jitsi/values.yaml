---
publicURL: https://talk.jfp.one
tz: Europe/Berlin

websockets:
  xmpp:
    enabled: true

enableAuth: true
enableGuests: false

extraCommonEnvs:
  JWT_APP_ID: jitsi
  JWT_ACCEPTED_ISSUERS: authentik
  JWT_ACCEPTED_AUDIENCES: jitsi
  # Use Authentik's JWKS for RS256 token validation
  JWT_ASAP_KEYSERVER: https://sso.jfp.one/application/o/jitsi/jwks/
  TOKEN_AUTH_URL: https://sso.jfp.one/application/o/authorize/?client_id={JITSI_CLIENT_ID}&response_type=id_token&redirect_uri={publicURL}&scope=openid%20email%20profile%20jitsi

web:
  ingress:
    enabled: false
  extraEnvFrom:
    - secretRef:
        name: jitsi-secrets

jvb:
  service:
    type: ClusterIP

excalidraw:
  enabled: true
