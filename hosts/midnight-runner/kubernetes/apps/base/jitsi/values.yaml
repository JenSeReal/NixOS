---
publicURL: https://talk.jfp.one
tz: Europe/Berlin
websockets:
  xmpp:
    enabled: true
enableAuth: true
enableGuests: true
extraCommonEnvs:
  AUTH_TYPE: jwt
  JWT_APP_ID: jitsi
  JWT_ACCEPTED_ISSUERS: authentik
  JWT_ACCEPTED_AUDIENCES: jitsi
  TOKEN_AUTH_URL: "https://talk.jfp.one/oidc/auth?state={state}"
prosody:
  extraEnvs:
    JWT_APP_SECRET:
      secretKeyRef:
        name: jitsi-keycloak-adapter
        key: JWT_APP_SECRET
web:
  ingress:
    enabled: false
jvb:
  service:
    type: ClusterIP
excalidraw:
  enabled: true
