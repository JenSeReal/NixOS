---
publicURL: https://talk.jfp.one
tz: Europe/Berlin
websockets:
  xmpp:
    enabled: true
enableAuth: true
enableGuests: false
extraCommonEnvs:
  AUTH_TYPE: jwt
  JWT_APP_ID: jitsi
  JWT_ACCEPTED_ISSUERS: authentik,https://sso.jfp.one/application/o/jitsi/
  JWT_ACCEPTED_AUDIENCES: jitsi
  JWT_ASAP_KEYSERVER: https://sso.jfp.one/application/o/jitsi/jwks/
  TOKEN_AUTH_URL: https://talk.jfp.one/oidc/auth?state={state}
prosody:
  extraEnvs:
  - name: JWT_APP_SECRET
    valueFrom:
      secretKeyRef:
        name: jitsi-keycloak-adapter
        key: jwt-app-secret
web:
  ingress:
    enabled: false
  extraEnvs:
  - name: JWT_APP_SECRET
    valueFrom:
      secretKeyRef:
        name: jitsi-keycloak-adapter
        key: jwt-app-secret
jvb:
  service:
    type: ClusterIP
excalidraw:
  enabled: true
