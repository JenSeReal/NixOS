---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: github-runner
spec:
  interval: 30m
  dependsOn:
  - name: actions-runner-controller
    namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.1"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  values:
    # URL of the GitHub repo or organisation to register the runner against.
    # Examples:
    #   repo:  https://github.com/YOUR_ORG/YOUR_REPO
    #   org:   https://github.com/YOUR_ORG
    githubConfigUrl: "https://github.com/JenSeReal"
    # Secret must contain either:
    #   github_token: <PAT with repo/org scope>
    # or GitHub App credentials:
    #   github_app_id, github_app_installation_id, github_app_private_key
    githubConfigSecret: github-runner-secret
    minRunners: 0
    maxRunners: 3
    containerMode:
      type: dind
