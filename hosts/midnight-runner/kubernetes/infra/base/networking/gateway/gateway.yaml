---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    hostname: "jfp.one"
    tls:
      mode: Terminate
      certificateRefs:
      - name: jfp-one-tls
  - name: authentik-https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    hostname: "sso.jfp.one"
    tls:
      mode: Terminate
      certificateRefs:
      - name: authentik-jfp-one-tls
