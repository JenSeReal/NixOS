---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dev
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: jens@plueddemann.de
    privateKeySecretRef:
      name: letsencrypt-dev-account-key
    solvers:
    - selector:
        dnsNames:
        - "sso.jfp.one"
      http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: jfp-one
            kind: Gateway
            namespace: networking
            sectionName: authentik-http
    - selector:
        dnsNames:
        - "jfp.one"
      http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: jfp-one
            kind: Gateway
            namespace: networking
            sectionName: http
